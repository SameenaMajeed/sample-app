<div class="card">
  <h2>Welcome Back</h2>
  <p>Don&apos;t have an account? <b>Sign up</b></p>
  
  <form>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" class="input" placeholder="name@company.com">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" class="input" placeholder="••••••••">
    </div>

    <button type="submit" class="button">Sign In</button>
  </form>

  <div class="divider">OR</div>

  <div class="socials">
    <button aria-label="Sign in with Apple" type="button"></button>
    <button aria-label="Sign in with Google" type="button">G</button>
    <button aria-label="Sign in with X" type="button">X</button>
  </div>
</div>
